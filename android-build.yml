name: Build WorkWorth APK

on:
push:
branches: [ main ]
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 18

  - name: Install packages
    run: npm install

  - name: Build app
    run: npm run build

  - name: Install Capacitor
    run: npm install @capacitor/core @capacitor/cli @capacitor/android

  - name: Setup Android
    run: |
      npx cap init WorkWorth com.workworth.app --web-dir=dist
      npx cap add android
      npx cap sync

  - name: Build APK
    run: |
      cd android
      chmod +x gradlew
      ./gradlew assembleDebug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: workworth-apk
      path: android/app/build/outputs/apk/debug/app-debug.apk
